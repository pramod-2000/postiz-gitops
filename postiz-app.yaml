apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postiz
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/pramod-2000/postiz-gitops.git
    targetRevision: main
    path: apps/postiz

  destination:
    server: https://kubernetes.default.svc
    namespace: postiz

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
