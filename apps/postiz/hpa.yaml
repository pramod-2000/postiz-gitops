apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: postiz-hpa
  namespace: postiz

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: postiz

  minReplicas: 3
  maxReplicas: 10

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 50
